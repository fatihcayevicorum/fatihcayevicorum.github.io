<!doctype html><html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Ana Sayfa Yönetimi | Fatih Çay Evi</title><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"><link rel="stylesheet" href="../panel-header.css?v=5"><link rel="stylesheet" href="style.css?v=1"><link rel="stylesheet" href="enhancements.css?v=1"></head><body>
<header class="app-header"><div class="header-inner"><div class="brand"><img src="../logo.png" class="brand-logo"><div class="brand-copy"><p class="eyebrow">Fatih Çay Evi</p><h1>Ana Sayfa Yönetimi</h1></div></div><div class="header-actions"><a class="preview" href="../" target="_blank"><i class="fa-solid fa-eye"></i> Ön İzleme</a><button class="logout-button" id="logout"><i class="fa-solid fa-right-from-bracket"></i></button></div></div></header>
<main><section class="panel"><div class="heading"><div><p>Genel içerik</p><h2>Başlıklar ve Bağlantılar</h2></div><span id="status">Bağlanıyor</span></div><form id="generalForm" class="fields"><label>İşletme adı<input id="businessName"></label><label>Üst başlık<input id="heroTitle"></label><label>Alt başlık<input id="subtitle"></label><label>Slogan<input id="slogan"></label><label>Karşılama başlığı<input id="welcomeTitle"></label><label class="full">Karşılama yazısı<textarea id="welcomeText" rows="2"></textarea></label><label>Instagram bağlantısı<input id="instagramUrl" type="url"></label><label>Konum bağlantısı<input id="mapsUrl" type="url"></label><label>Telefon<input id="phone"></label><label>Google yorum bağlantısı<input id="reviewUrl" type="url"></label><button class="primary full">Bilgileri Kaydet</button></form></section>
<section class="panel"><div class="heading"><div><p>Ortak görseller</p><h2>Logo ve Galeri</h2></div></div><div class="upload-grid"><form id="logoForm"><label>Sistem logosu<input id="logoFile" type="file" accept="image/*" required></label><img id="logoPreview" src="../logo.png"><button class="primary">Tüm Sistemde Logoyu Değiştir</button></form><form id="galleryForm"><label>Galeri görseli<input id="galleryFile" type="file" accept="image/*" required></label><label>Görsel açıklaması<input id="galleryAlt" maxlength="80"></label><button class="primary">Galeriye Ekle</button></form></div><div id="galleryAdmin" class="gallery-admin"></div></section>
<section class="panel"><div class="heading"><div><p>Haber alanları</p><h2>Duyurular ve Kampanyalar</h2></div></div><div class="content-forms"><form id="announcementForm"><h3>Yeni Duyuru</h3><input id="announcementTitle" required placeholder="Başlık"><textarea id="announcementText" required placeholder="Açıklama"></textarea><input id="announcementEnd" type="date"><button class="primary">Duyuru Ekle</button></form><form id="campaignForm"><h3>Yeni Görsel Kampanya</h3><input id="campaignTitle" required placeholder="Kampanya başlığı"><textarea id="campaignText" placeholder="Kısa açıklama (isteğe bağlı)"></textarea><label class="file-label">Kampanya görseli<input id="campaignFile" type="file" accept="image/*" required></label><input id="campaignEnd" type="date"><button class="primary">Görsel Kampanyayı Yayınla</button></form></div><div id="contentAdmin"></div></section></main><div id="toast"></div><script type="module" src="script.js?v=2"></script><script type="module" src="../system-ui.js?v=1"></script></body></html>
